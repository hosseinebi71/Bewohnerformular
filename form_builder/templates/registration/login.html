{% load static %}
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · Bewohnerformular</title>
  <link rel="stylesheet" href="{% static 'form_builder/app.css' %}">
</head>
<body class="login-body">
  <main class="login-card">
    <div class="brand login-brand"><span class="brand-mark">BF</span><span><strong>Bewohnerformular</strong><small>Formularprozesse</small></span></div>
    <h1>Anmelden</h1>
    <form class="login-form" method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}
      {% for field in form %}
        <p>
          {{ field.label_tag }}
          {{ field }}
          {% for error in field.errors %}<span class="error">{{ error }}</span>{% endfor %}
        </p>
      {% endfor %}
      <button class="button wide" type="submit">Einloggen</button>
    </form>
  </main>
</body>
</html>
