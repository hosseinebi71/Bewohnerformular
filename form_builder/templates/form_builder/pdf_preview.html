{% extends "form_builder/base.html" %}
{% block content %}
<section class="panel pdf-page-panel">
  <div class="panel-head"><div><p class="eyebrow">PDF</p><h2>{{ form_entry.form.title }}</h2><p>{{ form_entry.bewohner }}</p></div><div class="button-row"><a class="button ghost" href="{% url 'form_builder:entry_detail' form_entry.id %}">Zurück</a><a class="button ghost" target="_blank" href="{% url 'form_builder:entry_pdf_preview' form_entry.id %}?inline=1">PDF-Tab</a><form method="post" action="{% url 'form_builder:entry_pdf_generate' form_entry.id %}">{% csrf_token %}<button class="button" type="submit">PDF speichern</button></form></div></div>
  <iframe class="pdf-frame large" src="{% url 'form_builder:entry_pdf_preview' form_entry.id %}?inline=1" title="PDF Vorschau"></iframe>
</section>
{% endblock %}
