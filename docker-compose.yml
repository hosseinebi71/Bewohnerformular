services:
  web:
    build: .
    container_name: bewohnerformular_web
    environment:
      DJANGO_SECRET_KEY: dev-only-change-me
      DJANGO_DEBUG: "False"
      DJANGO_ENVIRONMENT: production
      DJANGO_DB_ENGINE: postgresql
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: http://127.0.0.1:8000,http://localhost:8000
      DJANGO_SECURE_SSL_REDIRECT: "False"
      DJANGO_SESSION_COOKIE_SECURE: "False"
      DJANGO_CSRF_COOKIE_SECURE: "False"
      DJANGO_SECURE_HSTS_SECONDS: "0"
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      DEFAULT_FROM_EMAIL: noreply@localhost
      POSTGRES_DB: bewohnerformular
      POSTGRES_USER: bewohnerformular
      POSTGRES_PASSWORD: bewohnerformular
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - static_volume:/app/staticfiles
      - private_documents:/app/private_documents

  db:
    image: postgres:16
    container_name: bewohnerformular_db
    environment:
      POSTGRES_DB: bewohnerformular
      POSTGRES_USER: bewohnerformular
      POSTGRES_PASSWORD: bewohnerformular
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  static_volume:
  private_documents:
