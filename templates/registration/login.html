{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anmeldung</title>
    <link rel="stylesheet" href="{% static 'form_builder/css/app.css' %}">
</head>
<body class="auth-shell">
    <main class="auth-card">
        <h1>Anmeldung</h1>
        <p class="auth-card__intro">Bitte melden Sie sich an, um auf das Formularsystem zuzugreifen.</p>
        {% if form.errors %}
            <div class="flash-message flash-message--error">Anmeldung fehlgeschlagen. Bitte pruefen Sie Ihre Eingaben.</div>
        {% endif %}
        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="button button--primary button--full">Anmelden</button>
        </form>
    </main>
</body>
</html>
